apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snmp-exporter
  namespace: argocd
spec:
  project: default

  sources:
    
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-snmp-exporter
      targetRevision: 9.12.1
      helm:
        valueFiles:
          - $values/platform/monitoring/snmp-exporter/values.yaml

    
    - repoURL: https://github.com/svargas-sre/sanvicr-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true